<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2e5c"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle circuit dot accent top-right -->
  <circle cx="25" cy="7" r="2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="25" cy="7" r="1" fill="rgba(255,255,255,0.6)"/>
  <!-- Small connector lines suggesting circuit -->
  <line x1="23" y1="7" x2="20" y2="7" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="25" y1="9" x2="25" y2="12" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- "AO" monogram -->
  <text
    x="15"
    y="22"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="14"
    letter-spacing="0.5"
    fill="white"
  >AO</text>
</svg>
